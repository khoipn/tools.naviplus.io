<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting… – Navi+ Toolbox</title>
  <script>
    (function () {
      var LANGS = ['en','vi','fr','de','zh-cn','ja','it','pt','es'];
      var parts = window.location.pathname.replace(/^\//, '').split('/');
      var lang = parts[0];
      if (LANGS.indexOf(lang) >= 0) {
        if (lang !== 'en') {
          try { sessionStorage.setItem('np_tools_lang', lang); } catch (e) {}
        }
        var rest = '/' + parts.slice(1).join('/');
        if (rest === '/' || rest === '') rest = '/';
        window.location.replace(rest);
      } else {
        document.getElementById('msg').style.display = 'block';
      }
    })();
  </script>
</head>
<body>
  <div id="msg" style="display:none;font-family:system-ui,sans-serif;max-width:480px;margin:80px auto;text-align:center;padding:0 24px;">
    <div style="font-size:72px;font-weight:900;color:#111;line-height:1;">404</div>
    <p style="color:#6b7280;margin:14px 0 28px;font-size:15px;">Page not found.</p>
    <a href="/" style="color:#111;font-weight:600;font-size:14px;">← Go home</a>
  </div>
</body>
</html>
