<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MW0VM1RL2K"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MW0VM1RL2K');
    </script>

    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

    {%- seo -%} <!-- Jekyll SEO Tag: tự sinh og/twitter/canonical -->

    <!-- Chèn thêm tuỳ từng trang nếu cần -->
    {%- if page.extra_css %}<link rel="stylesheet" href="{{ page.extra_css }}">{% endif %}
    {%- if page.extra_js %}<script defer src="{{ page.extra_js }}"></script>{% endif %}

    <!-- Include phần head do bạn quản lý -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CSS/JS chung của bạn -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <script defer src="/assets/js/i18n.js"></script>
    <script defer src="/assets/js/common.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
  </head>
  <body>
    {% include head.html %}
    <!-- Content BEG ---------------------------------------->
    {% unless page.url == "/" %}
    <nav class="tools-breadcrumb">
      <div class="container tools-breadcrumb-inner">
        <a href="/" class="tools-back-link"><i class="ri-arrow-left-line"></i> <span data-i18n="back_home">Home</span></a>
        <div id="tool-tabs" class="tool-tabs-bar"></div>
      </div>
    </nav>
    <div id="np-page-skel" aria-hidden="true">
      <div class="np-skel-tabbar">
        <span class="skel" style="width:90px;height:13px;border-radius:4px;flex-shrink:0;"></span>
        <span class="skel" style="width:110px;height:13px;border-radius:4px;flex-shrink:0;"></span>
        <span class="skel" style="width:80px;height:13px;border-radius:4px;flex-shrink:0;"></span>
        <span class="skel" style="width:100px;height:13px;border-radius:4px;flex-shrink:0;"></span>
      </div>
      <div class="container py-4">
        <div class="skel" style="height:26px;width:42%;max-width:280px;margin-bottom:10px;"></div>
        <div class="skel" style="height:14px;width:62%;max-width:420px;margin-bottom:32px;"></div>
        <div class="skel" style="height:300px;border-radius:12px;margin-bottom:16px;"></div>
        <div class="d-flex gap-2 mt-2">
          <div class="skel" style="height:36px;width:140px;border-radius:8px;"></div>
          <div class="skel" style="height:36px;width:120px;border-radius:8px;"></div>
        </div>
      </div>
    </div>
    {% endunless %}

      {{ content }}

    <!-- Content END ---------------------------------------->  
    {% include footer.html %}  
  </body>
  
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</html>
